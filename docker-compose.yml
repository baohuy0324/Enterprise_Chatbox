services:
  redis:
    image: redis:7-alpine
    container_name: redis-pdf
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: enterprise-chatbox-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  redis_data:
